[package]
name = "kasl"
version = "0.2.0"
edition = "2024"
license = "Apache-2.0"
description = "Compile and run KASL programs from your Rust code."
repository = "https://github.com/hatya-mouse/kasl"
homepage = "https://hatya.dev"
readme = "README.md"

[lib]
name = "kasl"
path = "src/lib.rs"

[dependencies]
kasl-core = "0.1.0"
kasl-cranelift-backend = "0.1.0"
kasl-ir = "0.1.0"
